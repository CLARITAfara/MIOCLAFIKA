# ─── Serveur ───
# Le front React appelle http://localhost:5021 → on garde le meme port que l'API C#
server.port=5021

# ─── Base de donnees PostgreSQL (identique a l'API C#) ───
spring.datasource.url=jdbc:postgresql://localhost:5432/pg4
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ───
# Le schema est gere manuellement via bd/00_script.sql → Hibernate ne doit PAS toucher au schema
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ─── Upload de fichiers (MP3) ───
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ─── Dossier d'upload des MP3 ───
mixeo.uploads-dir=Uploads
